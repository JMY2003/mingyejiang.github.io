    <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />

      :root {
        color-scheme: light;
        --ink: #0f172a;
        --muted: #64748b;
        --line: rgba(148, 163, 184, 0.28);
        --paper: #eef6ff;
        --white: #ffffff;
        --cyan: #00d4ff;
        --blue: #3478f6;
        --green: #30d158;
        --pink: #ff4fd8;
        --amber: #ffcc00;
        --glass: rgba(255, 255, 255, 0.58);
        --glass-strong: rgba(255, 255, 255, 0.74);
        --glass-soft: rgba(255, 255, 255, 0.34);
        --shadow: 0 28px 70px rgba(37, 67, 123, 0.22);
        --inner-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.88), inset 0 -1px 0 rgba(255, 255, 255, 0.34);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        position: relative;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(115deg, rgba(52, 120, 246, 0.12), transparent 32%, rgba(255, 79, 216, 0.1) 58%, transparent 78%),
          linear-gradient(rgba(52, 120, 246, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px),
          linear-gradient(135deg, #f7fbff 0%, #f4fff8 46%, #fff8fd 100%);
        background-attachment: fixed;
        background-size: auto, 30px 30px, 30px 30px, auto;
        line-height: 1.72;
        letter-spacing: 0;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0) 38%),
          linear-gradient(280deg, rgba(0, 212, 255, 0.12), rgba(255, 255, 255, 0) 42%);
        mix-blend-mode: screen;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .language-toggle {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 20;
        min-height: 38px;
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.38));
        color: var(--blue);
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 850;
        box-shadow: 0 16px 36px rgba(37, 67, 123, 0.18), var(--inner-highlight);
        backdrop-filter: blur(22px) saturate(170%);
        -webkit-backdrop-filter: blur(22px) saturate(170%);
      }

      .page {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 54px 0 58px;
      }

      .resume {
        position: relative;
        overflow: hidden;
        padding: clamp(24px, 4.5vw, 48px);
        border: 1px solid rgba(255, 255, 255, 0.64);
        border-radius: 28px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.46)),
          linear-gradient(115deg, rgba(52, 120, 246, 0.08), rgba(255, 255, 255, 0), rgba(255, 79, 216, 0.06));
        box-shadow: var(--shadow);
        backdrop-filter: blur(28px) saturate(180%);
        -webkit-backdrop-filter: blur(28px) saturate(180%);
      }

      .resume::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 7px;
        background: linear-gradient(90deg, var(--cyan), var(--blue), var(--pink), var(--amber), var(--green), var(--cyan));
        opacity: 0.92;
      }

      .resume::after {
        content: "";
        position: absolute;
        inset: 1px;
        pointer-events: none;
        border-radius: 27px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0) 28%, rgba(255, 255, 255, 0.32) 78%, rgba(255, 255, 255, 0));
        mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
        -webkit-mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
        mask-composite: exclude;
        -webkit-mask-composite: xor;
        padding: 1px;
      }

      .top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px;
        gap: 24px;
        align-items: start;
        padding: 18px 0 28px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.24);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(42px, 7vw, 72px);
        line-height: 1;
        font-weight: 920;
        text-shadow: 0 8px 24px rgba(52, 120, 246, 0.08);
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 38px;
        margin: 0 0 18px;
        color: var(--blue);
        font-size: 18px;
        font-weight: 850;
      }

      .contact {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 18px;
        margin: 0 0 18px;
        padding: 0;
        color: #263244;
        list-style: none;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 9px 16px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 999px;
        font-weight: 850;
        box-shadow: 0 14px 28px rgba(49, 100, 244, 0.16), var(--inner-highlight);
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .button:hover,
      .language-toggle:hover,
      .tab-button:hover {
        transform: translateY(-1px);
      }

      .button.primary {
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        color: #fff;
      }

      .button.secondary {
        border-color: rgba(255, 255, 255, 0.68);
        background: rgba(255, 255, 255, 0.54);
        color: var(--blue);
      }

      .photo {
        width: 132px;
        aspect-ratio: 3 / 4;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.58);
        box-shadow: 0 18px 36px rgba(17, 24, 39, 0.12), var(--inner-highlight);
      }

      .photo img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 16%;
      }

      h2 {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 16px;
        color: #102034;
        font-size: 24px;
        line-height: 1.2;
      }

      h2::before {
        content: "";
        width: 8px;
        height: 26px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--cyan), var(--pink));
      }

      h3 {
        margin: 0 0 10px;
        font-size: 21px;
        line-height: 1.35;
      }

      p {
        margin: 0;
      }

      .tab-shell {
        margin-top: 30px;
        border: 1px solid rgba(255, 255, 255, 0.58);
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.34));
        box-shadow: 0 18px 44px rgba(34, 56, 110, 0.12), var(--inner-highlight);
        backdrop-filter: blur(24px) saturate(170%);
        -webkit-backdrop-filter: blur(24px) saturate(170%);
        overflow: hidden;
      }

      .tab-strip {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 12px 12px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        scrollbar-width: thin;
      }

      .tab-button {
        flex: 0 0 auto;
        min-width: 128px;
        min-height: 46px;
        padding: 8px 13px;
        border: 1px solid rgba(255, 255, 255, 0.56);
        border-bottom: 0;
        border-radius: 16px 16px 0 0;
        background: linear-gradient(145deg, rgba(238, 244, 255, 0.7), rgba(255, 255, 255, 0.34));
        color: #344054;
        cursor: pointer;
        font: inherit;
        text-align: center;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        transition: transform 180ms ease, background 180ms ease, color 180ms ease;
      }

      .tab-button:nth-child(2n) {
        background: linear-gradient(145deg, rgba(238, 251, 245, 0.74), rgba(255, 255, 255, 0.32));
      }

      .tab-button:nth-child(3n) {
        background: linear-gradient(145deg, rgba(255, 247, 237, 0.78), rgba(255, 255, 255, 0.34));
      }

      .tab-button:nth-child(4n) {
        background: linear-gradient(145deg, rgba(248, 237, 255, 0.78), rgba(255, 255, 255, 0.34));
      }

      .tab-button[aria-selected="true"] {
        position: relative;
        top: 1px;
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(255, 255, 255, 0.78);
        color: var(--blue);
        box-shadow: 0 10px 24px rgba(52, 120, 246, 0.12), var(--inner-highlight);
      }

      .tab-title {
        display: block;
        overflow: hidden;
        max-width: 100%;
        font-size: 15px;
        font-weight: 850;
        line-height: 1.28;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab-panel {
        display: none;
        padding: 22px;
      }

      .tab-panel.active {
        display: block;
      }

      .panel-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 12px;
      }

      .side-note {
        flex: 0 0 auto;
        color: #b832d6;
        font-size: 14px;
        font-weight: 850;
      }

      .entry-list {
        display: grid;
        gap: 14px;
      }

      .entry {
        display: grid;
        grid-template-columns: 152px minmax(0, 1fr);
        gap: 18px;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 18px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.74), rgba(248, 251, 255, 0.46));
        box-shadow: 0 12px 30px rgba(34, 56, 110, 0.08), var(--inner-highlight);
        backdrop-filter: blur(18px) saturate(150%);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
      }

      .entry-time {
        color: var(--blue);
        font-size: 14px;
        font-weight: 850;
      }

      .education-heading {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }

      .education-school {
        margin: 0;
      }

      .education-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .education-pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 4px 10px;
        border: 1px solid rgba(255, 255, 255, 0.64);
        border-radius: 999px;
        background: rgba(238, 244, 255, 0.72);
        color: var(--blue);
        font-size: 13px;
        font-weight: 850;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .education-pill:nth-child(2) {
        border-color: rgba(255, 255, 255, 0.66);
        background: rgba(238, 251, 245, 0.74);
        color: var(--green);
      }

      .lines {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .label {
        color: var(--muted);
        font-weight: 850;
      }

      .block {
        display: grid;
        gap: 8px;
      }

      .skill-list,
      .award-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .skill-list li {
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr);
        gap: 14px;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.58);
        box-shadow: var(--inner-highlight);
      }

      .award-list li {
        padding: 11px 14px;
        border-left: 4px solid var(--green);
        border-radius: 14px;
        background: rgba(240, 251, 246, 0.7);
        box-shadow: var(--inner-highlight);
      }

      .award-list li:nth-child(2n) {
        border-left-color: var(--blue);
        background: rgba(240, 245, 255, 0.72);
      }

      .award-list li:nth-child(3n) {
        border-left-color: var(--amber);
        background: rgba(255, 248, 237, 0.72);
      }

      @media (max-width: 760px) {
        .page {
          padding-top: 74px;
        }

        .resume {
          padding: 22px;
        }

        .top,
        .skill-list li,
        .contact {
          grid-template-columns: 1fr;
        }

        .photo {
          width: 116px;
          order: -1;
        }

        .panel-head {
          align-items: flex-start;
          flex-direction: column;
          gap: 4px;
        }

        .side-note {
          flex: 0 1 auto;
        }

        .tab-title {
          white-space: normal;
        }

        .tab-panel {
          padding: 17px;
        }

        .entry {
          grid-template-columns: 1fr;
          gap: 8px;
          padding: 14px;
        }
      }
    </style>
  </head>

      let currentLang = "zh";

      function el(tag, options = {}, children = []) {
        const node = document.createElement(tag);
        if (options.className) node.className = options.className;
        if (options.text !== undefined) node.textContent = options.text;
        if (options.html !== undefined) node.innerHTML = options.html;
        Object.entries(options.attrs || {}).forEach(([key, value]) => node.setAttribute(key, value));
        children.forEach((child) => node.appendChild(child));
        return node;
      }

      function renderEntry(entry) {
        const content = el("div");
        if (entry.school) {
          content.appendChild(
            el("div", { className: "education-heading" }, [
              el("h3", { className: "education-school", text: entry.school }),
              el("div", { className: "education-meta" }, [
                el("span", { className: "education-pill", text: entry.degree }),
                el("span", { className: "education-pill", text: entry.major }),
              ]),
            ])
          );
        } else {
          const head = el("div", { className: "panel-head" }, [el("h3", { text: entry.title })]);
          if (entry.side) head.appendChild(el("span", { className: "side-note", text: entry.side }));
          content.appendChild(head);
        }

        if (entry.lines) {
          const list = el("ul", { className: "lines" });
          entry.lines.forEach(([label, value]) => {
            list.appendChild(el("li", {}, [el("span", { className: "label", text: label }), document.createTextNode(value)]));
          });
          content.appendChild(list);
        }

        if (entry.text) content.appendChild(el("p", { text: entry.text }));

        if (entry.paragraphs) {
          content.classList.add("block");
          entry.paragraphs.forEach(([label, value]) => {
            content.appendChild(el("p", {}, [el("span", { className: "label", text: label }), document.createTextNode(value)]));
          });
        }

        return el("article", { className: "entry" }, [el("div", { className: "entry-time", text: entry.time }), content]);
      }

      function renderSection(section, index) {
        const panel = el("section", {
          className: `tab-panel${index === 0 ? " active" : ""}`,
          attrs: {
            role: "tabpanel",
            id: `part-${section.id}`,
            "aria-labelledby": `part-tab-${section.id}`,
          },
        });
        panel.appendChild(el("h2", { text: section.title }));

        if (section.entries) {
          const list = el("div", { className: "entry-list" });
          section.entries.forEach((entry) => list.appendChild(renderEntry(entry)));
          panel.appendChild(list);
        }

        if (section.skills) {
          const list = el("ul", { className: "skill-list" });
          section.skills.forEach(([label, value]) => {
            list.appendChild(el("li", {}, [el("span", { className: "label", text: label }), el("span", { text: value })]));
          });
          panel.appendChild(list);
        }

        if (section.awards) {
          const list = el("ul", { className: "award-list" });
          section.awards.forEach((award) => list.appendChild(el("li", { text: award })));
          panel.appendChild(list);
        }

        return panel;
      }

      function render(lang) {
        currentLang = lang;
        const data = resumeData[lang];
        document.documentElement.lang = data.htmlLang;
        document.title = data.title;
        document.querySelector('meta[name="description"]').setAttribute("content", data.description);
        document.getElementById("languageToggle").textContent = data.toggle;
        document.getElementById("name").textContent = data.name;
        document.getElementById("profilePhoto").alt = data.photoAlt;
        document.getElementById("summary").replaceChildren(...data.summary.map((item) => el("span", { text: item })));
        document.getElementById("contact").replaceChildren(...data.contact.map((item) => el("li", { text: item })));
        document.getElementById("emailButton").textContent = data.actions.email;
        document.getElementById("downloadButton").textContent = data.actions.viewPdf;

        const tabs = document.getElementById("partTabs");
        const panels = document.getElementById("partPanels");
        tabs.replaceChildren();
        panels.replaceChildren();

        data.sections.forEach((section, index) => {
          tabs.appendChild(
            el("button", {
              className: "tab-button",
              attrs: {
                type: "button",
                role: "tab",
                "aria-selected": String(index === 0),
                "aria-controls": `part-${section.id}`,
                id: `part-tab-${section.id}`,
              },
            }, [el("span", { className: "tab-title", text: section.title })])
          );
          panels.appendChild(renderSection(section, index));
        });

        wireTabs();
      }

      function wireTabs() {
        const shell = document.querySelector("[data-tabs]");
        const buttons = Array.from(shell.querySelectorAll(".tab-button"));
        const panels = Array.from(shell.querySelectorAll(".tab-panel"));

        buttons.forEach((button) => {
          button.addEventListener("click", () => {
            const targetId = button.getAttribute("aria-controls");
            buttons.forEach((item) => item.setAttribute("aria-selected", String(item === button)));
            panels.forEach((panel) => panel.classList.toggle("active", panel.id === targetId));
          });
        });
      }

      document.getElementById("languageToggle").addEventListener("click", () => {
        render(currentLang === "zh" ? "en" : "zh");
      });

      render(currentLang);
    </script>
